<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>沙沁 · 体验设计师 | Design is about how the pieces fall together</title>
  <meta name="description" content="沙沁个人网站 - AI时代体验设计师，俄罗斯方块主题创意展示">
  <meta name="keywords" content="沙沁,体验设计师,UI设计,产品设计,AI设计,Figma">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 进度条 -->
  <div id="progress-bar"></div>

  <!-- 自定义光标 -->
  <div id="cursor-dot"></div>
  <div id="cursor-glow"></div>

  <!-- 导航 - 仅Logo -->
  <nav id="nav" class="nav nav-simple">
    <div class="nav-inner">
      <a href="#" class="nav-logo">
        <span class="logo-block"></span>
        <span class="logo-text">SQ.</span>
      </a>
    </div>
  </nav>

  <!-- 主游戏画布 -->
  <main id="game-container">
    <!-- 游戏画布 -->
    <canvas id="tetris-canvas"></canvas>

    <!-- 网格背景 -->
    <div class="grid-overlay"></div>

    <!-- Hero区内容覆盖层 - 首页直接显示，更大更显眼 -->
    <section id="hero" class="hero-overlay hero-large">
      <div class="hero-content">
        <div class="hero-badge">
          <span class="badge-dot"></span>
          <span>AI时代体验设计师</span>
        </div>
        <h1 class="hero-title">
          <span class="title-line">Design is about how</span>
          <span class="title-line highlight">the pieces fall together.</span>
        </h1>
        <p class="hero-subtitle">「设计，就是让每块都落在该落的位置。」</p>
        <div class="hero-intro">
          <p>我是沙沁。我相信设计如俄罗斯方块，每个像素、每次交互、每段文案，都要落在该落的位置。当所有方块就位，体验便自然流淌。</p>
        </div>
      </div>
    </section>
  </main>

  <!-- Click to Start 按钮 -->
  <div id="start-screen" class="start-screen">
    <button class="click-to-start" id="click-to-start">
      <span class="click-line1">CLICK TO</span>
      <span class="click-line2">START</span>
    </button>
  </div>

  <!-- 微信二维码弹窗 -->
  <div id="qrcode-modal" class="modal">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close" aria-label="关闭">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
      <h3 class="modal-title">微信联系</h3>
      <div class="qrcode-placeholder">
        <div class="qrcode-text">qq1476685495</div>
        <p class="qrcode-hint">搜索微信号添加好友</p>
      </div>
    </div>
  </div>

  <!-- 复制成功提示 -->
  <div id="copy-toast" class="toast">
    <span class="toast-icon">✓</span>
    <span class="toast-text">已复制到剪贴板</span>
  </div>

  <script src="js/tetris.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
